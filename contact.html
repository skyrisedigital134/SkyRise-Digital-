<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | SkyRise Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --black: #050505;
            --dark-grey: #121212;
            --gold: #DAA520;
            --white: #ffffff;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(218, 165, 32, 0.2);
        }

        .logo { height: 50px; }
        .nav-links { display: flex; list-style: none; gap: 25px; }
        .nav-links a { color: var(--white); text-decoration: none; font-size: 14px; transition: 0.3s; text-transform: uppercase; }
        .nav-links a:hover, .nav-links a.active { color: var(--gold); }

        /* Contact Section */
        .contact-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 8%;
            text-align: center;
        }

        .contact-header h1 {
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .contact-header p {
            color: #aaa;
            margin-bottom: 40px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .contact-card {
            background: var(--dark-grey);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #222;
            transition: 0.3s;
            text-decoration: none;
            color: white;
        }

        .contact-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            background: #1a1a1a;
        }

        .contact-card i {
            font-size: 40px;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .contact-card h3 {
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .contact-card p {
            color: #888;
            font-size: 0.9rem;
        }

        /* Social Link Button */
        .insta-btn {
            margin-top: 40px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.4s;
        }

        .insta-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(188, 24, 136, 0.3);
        }

        footer {
            padding: 30px;
            text-align: center;
            border-top: 1px solid #222;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

    <nav>
        <img src="1000000044.png" alt="SkyRise" class="logo">
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <div class="contact-container" data-aos="zoom-in">
        <div class="contact-header">
            <h1>Get In Touch</h1>
            <p>Ready to elevate your digital presence? Let's talk.</p>
        </div>

        <div class="contact-grid">
            <a href="mailto:skyrisedigital00@gmail.com" class="contact-card">
                <i class="fa-solid fa-envelope"></i>
                <h3>Email Us</h3>
                <p>skyrisedigital00@gmail.com</p>
            </a>

            <a href="https://wa.me/918218440133" class="contact-card">
                <i class="fa-brands fa-whatsapp"></i>
                <h3>WhatsApp</h3>
                <p>+91 8218440133</p>
            </a>

            <a href="tel:+918218440133" class="contact-card">
                <i class="fa-solid fa-phone"></i>
                <h3>Call Now</h3>
                <p>Available for consultation</p>
            </a>
        </div>

        <a href="https://www.instagram.com/skyrisedigital" target="_blank" class="insta-btn">
            <i class="fa-brands fa-instagram"></i> Follow on Instagram
        </a>
    </div>

    <footer>
        <p>&copy; 2026 SkyRise Digital | Designed for Excellence</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
